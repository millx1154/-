<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลืมรหัสผ่าน - SmartTracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; margin: 0; }
    </style>
</head>
<body class="h-screen flex items-center justify-center bg-gray-100 p-4">

    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-8 border-t-4 border-orange-500">
        
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800">กู้คืนรหัสผ่าน</h1>
            <p class="text-gray-500 mt-1 text-sm">กรุณายืนยันตัวตนเพื่อตั้งรหัสผ่านใหม่</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Username ของคุณ</label>
                <input type="text" id="resetUsername" class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-orange-500 focus:outline-none" placeholder="เช่น somchai.j">
            </div>
            
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">ชื่อ-นามสกุลจริง (เพื่อยืนยันตัวตน)</label>
                <input type="text" id="resetFullname" class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-orange-500 focus:outline-none" placeholder="เช่น อ.สมชาย ใจดี">
            </div>
            
            <hr class="my-4 border-gray-200">

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">ตั้งรหัสผ่านใหม่</label>
                <input type="password" id="newPassword" class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-orange-500 focus:outline-none" placeholder="รหัสผ่านใหม่ที่ต้องการ">
            </div>

            <button onclick="resetPassword()" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 px-4 rounded-lg shadow-md transition mt-2">
                บันทึกรหัสผ่านใหม่
            </button>
            
            <div class="text-center mt-4">
                <a href="login.html" class="text-sm font-bold text-gray-500 hover:text-gray-800">← กลับไปหน้าเข้าสู่ระบบ</a>
            </div>
        </div>
    </div>

    <script>
        async function resetPassword() {
            const user = document.getElementById('resetUsername').value;
            const fname = document.getElementById('resetFullname').value;
            const newPass = document.getElementById('newPassword').value;

            if(!user || !fname || !newPass) return alert("กรุณากรอกข้อมูลให้ครบทุกช่อง");

            try {
                const response = await fetch('api.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'reset_password', username: user, fullname: fname, new_password: newPass })
                });
                
                const result = await response.json();
                
                if(result.status === 'success') {
                    alert("✅ " + result.message + "\nคุณสามารถใช้รหัสผ่านใหม่ล็อกอินได้ทันทีครับ");
                    window.location.href = 'login.html';
                } else {
                    alert("❌ " + result.message);
                }
            } catch (err) { alert("เชื่อมต่อเซิร์ฟเวอร์ล้มเหลว"); }
        }
    </script>
</body>
</html>
