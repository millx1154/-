<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wireframe - SmartTracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; background-color: #f3f4f6; }
        .wf-box { background-color: #e5e7eb; border: 2px dashed #9ca3af; display: flex; align-items: center; justify-content: center; color: #6b7280; font-weight: 600; text-align: center; }
        .wf-solid { background-color: #d1d5db; border: 1px solid #9ca3af; display: flex; align-items: center; justify-content: center; color: #4b5563; font-weight: 600; }
    </style>
</head>
<body class="p-8">

    <div class="max-w-[1200px] mx-auto bg-white border-2 border-gray-400 shadow-lg rounded-t-lg overflow-hidden">
        
        <div class="bg-gray-200 border-b-2 border-gray-400 h-8 flex items-center px-4 gap-2">
            <div class="w-3 h-3 rounded-full bg-gray-400"></div>
            <div class="w-3 h-3 rounded-full bg-gray-400"></div>
            <div class="w-3 h-3 rounded-full bg-gray-400"></div>
            <div class="ml-4 w-64 h-4 bg-white rounded-sm border border-gray-300"></div>
        </div>

        <div class="h-16 wf-solid border-b-0 justify-between px-8">
            <div class="flex gap-4 items-center">
                <div class="w-10 h-10 bg-gray-400 rounded-md"></div> <div class="w-48 h-6 bg-gray-400 rounded-md"></div> </div>
            <div class="flex gap-4">
                <div class="w-24 h-8 bg-gray-300 rounded-md"></div> <div class="w-24 h-8 bg-gray-300 rounded-md"></div> <div class="w-10 h-10 bg-gray-400 rounded-full"></div> </div>
        </div>

        <div class="p-8">
            <div class="flex justify-between items-center mb-6">
                <div class="w-64 h-8 bg-gray-300 rounded-md"></div>
                <div class="w-40 h-10 bg-gray-400 rounded-md flex items-center justify-center text-white font-bold">ปุ่มบันทึกข้อมูล</div>
            </div>

            <div class="flex gap-4 mb-6 h-32">
                <div class="w-1/4 wf-box rounded-md flex-col gap-2">
                    <div class="w-32 h-4 bg-gray-300 rounded"></div>
                    <div class="w-full h-10 bg-gray-300 rounded mt-2"></div>
                </div>
                <div class="flex-1 wf-box rounded-md flex-col">
                    <svg class="w-8 h-8 text-gray-400 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                    <span>พื้นที่สำหรับลากวาง หรืออัปโหลดไฟล์ PDF</span>
                </div>
                <div class="w-40 wf-solid rounded-md font-bold text-gray-700 bg-gray-300 cursor-pointer">
                    ปุ่มสแกน PDF
                </div>
            </div>

            <div class="grid grid-cols-4 gap-4 mb-6">
                <div class="h-24 wf-box rounded-md">กล่องสถิติที่ 1 (ทั้งหมด)</div>
                <div class="h-24 wf-box rounded-md">กล่องสถิติที่ 2 (วิกฤต)</div>
                <div class="h-24 wf-box rounded-md">กล่องสถิติที่ 3 (รอพินิจ)</div>
                <div class="h-24 wf-box rounded-md">กล่องสถิติที่ 4 (พ้นสภาพ)</div>
            </div>

            <div class="w-full border-2 border-gray-300 rounded-md overflow-hidden">
                <div class="h-12 bg-gray-300 border-b-2 border-gray-400 flex items-center px-4 gap-4 text-gray-600 font-bold">
                    <div class="w-12">ลำดับ</div>
                    <div class="w-32">รหัสนักศึกษา</div>
                    <div class="w-48">ชื่อ-นามสกุล</div>
                    <div class="w-32">เกรดเฉลี่ย</div>
                    <div class="w-32">สถานะ</div>
                    <div class="flex-1">บันทึกเพิ่มเติม</div>
                </div>
                <div class="h-12 border-b border-gray-200 flex items-center px-4 gap-4">
                    <div class="w-12 h-4 bg-gray-200 rounded"></div>
                    <div class="w-32 h-4 bg-gray-200 rounded"></div>
                    <div class="w-48 h-4 bg-gray-200 rounded"></div>
                    <div class="w-32 h-4 bg-gray-200 rounded"></div>
                    <div class="w-32 h-6 bg-gray-300 rounded-full"></div>
                    <div class="flex-1 h-8 bg-gray-100 border border-gray-300 rounded"></div>
                </div>
                <div class="h-12 border-b border-gray-200 flex items-center px-4 gap-4">
                    <div class="w-12 h-4 bg-gray-200 rounded"></div>
                    <div class="w-32 h-4 bg-gray-200 rounded"></div>
                    <div class="w-48 h-4 bg-gray-200 rounded"></div>
                    <div class="w-32 h-4 bg-gray-200 rounded"></div>
                    <div class="w-32 h-6 bg-gray-300 rounded-full"></div>
                    <div class="flex-1 h-8 bg-gray-100 border border-gray-300 rounded"></div>
                </div>
                <div class="h-12 border-b border-gray-200 flex items-center px-4 gap-4">
                    <div class="w-12 h-4 bg-gray-200 rounded"></div>
                    <div class="w-32 h-4 bg-gray-200 rounded"></div>
                    <div class="w-48 h-4 bg-gray-200 rounded"></div>
                    <div class="w-32 h-4 bg-gray-200 rounded"></div>
                    <div class="w-32 h-6 bg-gray-300 rounded-full"></div>
                    <div class="flex-1 h-8 bg-gray-100 border border-gray-300 rounded"></div>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
