<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wireframe - Login Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; background-color: #f3f4f6; }
        .wf-box { background-color: #e5e7eb; border: 2px dashed #9ca3af; display: flex; align-items: center; justify-content: center; color: #6b7280; font-weight: 600; text-align: center; }
        .wf-solid { background-color: #d1d5db; border: 1px solid #9ca3af; display: flex; align-items: center; justify-content: center; color: #4b5563; font-weight: 600; }
        .wf-input { background-color: #f9fafb; border: 1px solid #9ca3af; color: #9ca3af; }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-8">

    <div class="w-full max-w-[1000px] h-[600px] bg-white border-2 border-gray-400 shadow-lg rounded-lg overflow-hidden flex flex-col relative">
        
        <div class="bg-gray-200 border-b-2 border-gray-400 h-8 flex items-center px-4 gap-2 shrink-0">
            <div class="w-3 h-3 rounded-full bg-gray-400"></div>
            <div class="w-3 h-3 rounded-full bg-gray-400"></div>
            <div class="w-3 h-3 rounded-full bg-gray-400"></div>
            <div class="ml-4 w-64 h-4 bg-white rounded-sm border border-gray-300"></div>
        </div>

        <div class="flex-1 bg-gray-100 flex items-center justify-center relative">
            
            <div class="w-[400px] bg-white border-2 border-gray-300 shadow-md rounded-lg p-8 relative z-10">
                
                <div class="flex flex-col items-center mb-8">
                    <div class="w-16 h-16 bg-gray-300 rounded-full mb-4 flex items-center justify-center">
                        <svg class="w-8 h-8 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 008 11a4 4 0 118 0c0 1.017-.07 2.019-.203 3m-2.118 6.844A21.88 21.88 0 0015.171 17m3.839 1.132c.645-2.266.99-4.659.99-7.132A8 8 0 008 4.07M3 15.364c.64-1.319 1-2.8 1-4.364 0-1.457.39-2.823 1.07-4"></path></svg>
                    </div>
                    <div class="w-48 h-6 bg-gray-400 rounded-md mb-2"></div> <div class="w-32 h-3 bg-gray-300 rounded-md"></div> </div>

                <div class="mb-5">
                    <div class="w-24 h-3 bg-gray-300 rounded-md mb-2"></div>
                    <div class="flex gap-4">
                        <div class="flex-1 h-10 wf-solid rounded-md border-2 border-gray-400 bg-gray-200">
                            <span class="text-sm">เจ้าหน้าที่ (User)</span>
                        </div>
                        <div class="flex-1 h-10 wf-solid rounded-md border-gray-300 bg-white">
                            <span class="text-sm">ผู้ดูแล (Admin)</span>
                        </div>
                    </div>
                </div>

                <div class="mb-4">
                    <div class="w-32 h-3 bg-gray-300 rounded-md mb-2"></div>
                    <div class="w-full h-10 wf-input rounded-md flex items-center px-3 text-sm">
                        กรอกชื่อผู้ใช้งาน
                    </div>
                </div>

                <div class="mb-6">
                    <div class="flex justify-between items-center mb-2">
                        <div class="w-20 h-3 bg-gray-300 rounded-md"></div>
                        <div class="w-16 h-2 bg-gray-200 rounded-md"></div> </div>
                    <div class="w-full h-10 wf-input rounded-md flex items-center px-3 text-sm">
                        ••••••••
                    </div>
                </div>

                <div class="w-full h-12 wf-solid rounded-md bg-gray-400 text-white text-lg">
                    เข้าสู่ระบบ
                </div>

            </div>
            
        </div>
    </div>

</body>
</html>
